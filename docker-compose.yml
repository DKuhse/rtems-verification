services:
  # Bare container for setup tasks (BSP build, etc.)
  toolchain:
    build:
      context: .
      dockerfile: Dockerfile
    image: rtems-edf-toolchain
    volumes:
      - ./rtems:/workspace/rtems

  # Headless verification
  verify:
    build:
      context: .
      dockerfile: Dockerfile
    image: rtems-edf-toolchain
    working_dir: /workspace/rtems/src/rtems-5.1/cpukit
    volumes:
      - ./rtems:/workspace/rtems
      - ./scripts:/opt/scripts
    command: ["verify-all.sh"]

  # RBTree verification side experiment. Layers Coq on top of the EDF
  # image (via Dockerfile.rbtree) so Frama-C can discharge structural-
  # induction lemmas Alt-Ergo 2.4.2 times out on.
  verify-rbtree:
    build:
      context: .
      dockerfile: Dockerfile.rbtree
    image: rtems-rbtree-toolchain
    user: "1000:1000"
    environment:
      - HOME=/root
    working_dir: /workspace/verification/rbtree
    volumes:
      - ./rtems:/workspace/rtems
      - ./scripts:/opt/scripts
      - ./verification:/workspace/verification
    command: ["/opt/scripts/rbtree/verify-rbtree-min.sh"]

  # Persistent interactive shell for Coq proof development. Keeps one
  # container alive across proof iterations — ~3s container startup is
  # painful when iterating on Ltac. Use as:
  #   docker compose run --rm rbtree-shell
  # then inside: coq-check.sh <file.v>, frama-c ..., edit, repeat.
  rbtree-shell:
    build:
      context: .
      dockerfile: Dockerfile.rbtree
    image: rtems-rbtree-toolchain
    user: "1000:1000"
    environment:
      - HOME=/root
    working_dir: /workspace/verification/rbtree
    volumes:
      - ./rtems:/workspace/rtems
      - ./scripts:/opt/scripts
      - ./verification:/workspace/verification
    stdin_open: true
    tty: true
    command: ["/bin/bash"]

  # Interactive shell with X11 forwarding for frama-c-gui
  # Usage: xhost +local:docker && docker compose run gui
  gui:
    build:
      context: .
      dockerfile: Dockerfile
    image: rtems-edf-toolchain
    working_dir: /workspace/rtems/src/rtems-5.1/cpukit
    environment:
      - DISPLAY=${DISPLAY}
    volumes:
      - /tmp/.X11-unix:/tmp/.X11-unix:rw
      - ./rtems:/workspace/rtems
      - ./scripts:/opt/scripts
      - ./verification:/workspace/verification
    stdin_open: true
    tty: true
    command: ["/bin/bash"]
